name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  # Allow deploy.yml to reuse this workflow as the master-green gate (FLO-246).
  # Purely additive — does not change the push/PR trigger behaviour.
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Unit Tests (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install gate tooling (lint + test + coverage)
        run: pip install -r requirements-dev.txt

      # Install the flock_os package WITHOUT pulling frappe (heavy, needs a
      # full bench + MariaDB). Unit tests here assert app identity/metadata and
      # do not import frappe. Frappe-level integration tests run locally via
      # `bench run-tests` (see README -> Runbook).
      - name: Install app package (no-deps)
        run: pip install -e . --no-deps

      # Mirror scripts/qa-gate.sh so "green here == green in CI". `--no-cache`
      # is load-bearing: a stale .ruff_cache was proven to mask real E101
      # errors (FLO-21).
      - name: Ruff lint (--no-cache)
        run: ruff check . --no-cache

      - name: Ruff format check
        run: ruff format --check .

      # Migration-drift gate (FLO-350 Phase 6.2): fails the merge gate whenever
      # the committed patch registry drifts from the patch modules that ship.
      # Static + plain-pytest (no Frappe/bench): catches orphan patches (a file
      # not registered in patches.txt that `bench migrate` would silently skip),
      # dangling entries (would ImportError mid-migrate), duplicate registrations,
      # and modules missing the Frappe `execute()` contract. The full Level-2
      # throwaway-DB `bench migrate` gate is staged behind the deploy pipeline
      # ([FLO-246]) which brings the bench infrastructure — see
      # docs/operations/migration-runbook.md §"CI migration-drift gate".
      - name: Migration drift gate
        run: pytest flock_os/tests/test_migration_drift.py -v

      # Coverage ratchet over the project-testable pure domain logic
      # ([tool.coverage.*] in pyproject.toml; bench-integration surface omitted).
      # Run only git-tracked test files — mirrors scripts/qa-gate.sh so "green
      # here == green in CI" both ways and keeps in-flight untracked WIP tests
      # out of the foundation gate (Architect directive, FLO-21).
      - name: Unit tests + coverage gate
        run: git ls-files -z 'flock_os/tests/test_*.py' | xargs -0 pytest --cov=flock_os --cov-branch --cov-report=term-missing

      # Operator tooling outside the flock_os app package (CEO heartbeat monitor
      # relocated to tools/ops/ by FLO-285, per architect FLO-283 Option b).
      # Enforced separately from the flock_os coverage ratchet above so the app's
      # pure-domain-logic floor measures only the app. Mirrors qa-gate.sh [5/5].
      - name: Operator tooling unit tests (tools/ops)
        run: git ls-files -z 'tools/**/tests/test_*.py' | xargs -0 pytest -q

      # Deploy render gate (FLO-672 Phase 6.1 no-board). The unit-of-deploy is
      # the `flock-os-bench` container image, whose site_config.json /
      # common_site_config.json are rendered from env at container start by
      # scripts/deploy/render-config.sh (and decrypted from the SOPS+age bundle
      # by render-secrets.sh). This runs the hermetic behavioral test
      # (scripts/test_deploy_render.sh): Section 1 (render-config from synthetic
      # env) + Section 3 (image/template artifacts) ALWAYS run; Section 2
      # (SOPS decrypt) SKIPs because CI has no age key. Catches template/render
      # drift + the zero-secrets fail-fast gate BEFORE the deploy workflow's own
      # --check runs post-merge. Needs only bash + jq (both runner-builtin).
      - name: Deploy render gate (config/secret rendering)
        run: scripts/test_deploy_render.sh
