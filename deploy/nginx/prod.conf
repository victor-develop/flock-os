# Flock OS production nginx (FLO-246 Phase 6.1).
#
# The front edge of the prod bench. Two jobs:
#   1. Sticky-L7 WS load balancer for the FLO-121 scaled-socketio tier
#      (N node backends on 127.0.0.1:9001..900N) — listen :9000.
#   2. Reverse proxy for Frappe web (gunicorn on 127.0.0.1:8000) + static asset
#      serving (unmetered on Frappe Cloud per hosting-quote) — listen :8080.
#
# This is the PROD shape. The dev `scripts/dev/nginx-socketio.conf.template`
# is a single-upstream LB for the ws-only k6 smoke; prod needs sticky L7
# because REAL browsers do the engine.io polling→websocket upgrade (a session
# that starts as polling MUST revisit the same backend on WS upgrade). The
# upstream `ip_hash` gives per-source-IP stickiness; for finer control (e.g.
# one LB source behind Cloudflare), swap to a cookie-sticky module — see the
# runbook (docs/development/deploy-runbook.md -> nginx sticky-L7).
#
# Why worker_connections 32768: each proxied WS connection is 2 fds on the LB
# (client + backend side), so size for >= 2x peak concurrent. 32k covers a
# full 15k §8 gate.
#
# TLS termination happens at the Cloudflare + Frappe Cloud edge (auto Let's
# Encrypt per ADR §6); this nginx receives plain HTTP from the edge. If you
# deploy on a self-hosted VM WITHOUT the Frappe Cloud edge, add an ssl {}
# block here or terminate TLS in a sibling nginx site — the runbook covers it.

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 32768;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Long-lived WS sessions are the norm (15k concurrent); sane defaults that
    # do not bottleneck a §8 gate window.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 64m;

    log_format flock '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct="$upstream_connect_time" '
                     'urt="$upstream_response_time"';
    # FLO-922 / FLO-586 §6 gap G5: sticky-upstream log format so a log-derived
    # counter can compute the §1.4 `ws.lb.affinity_miss_rate` metric. The
    # `upstream_backend` field surfaces the chosen backend per request (the
    # `_$` part is required so nginx emits the var even when no upstream is
    # involved; absent for the /static + /assets paths). The metric is derived
    # in the Prometheus `nginx-vts`/log tailer, not in nginx itself.
    log_format flock_sticky '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'rt=$request_time '
                            'upstream="$upstream_addr" '
                            'upstream_status="$upstream_status" '
                            'upstream_connect_time="$upstream_connect_time" '
                            'upstream_response_time="$upstream_response_time"';
    access_log /var/log/nginx/access.log flock;

    # FLO-922 / FLO-586 §6 gap G5: stub_status on a localhost-only location so
    # the nginx-vts exporter (or a simple text scrape) can read nginx's own
    # connection counters. Restricted to the internal monitoring network —
    # the same SEC-AUTH-1 / SEC-DOS-1 defense-in-depth as the telemetry
    # scrape endpoints. ``stub_status`` is compiled into the stock nginx:alpine
    # image used by docker-ws-tier.sh, so no extra module is needed.
    server {
        listen 127.0.0.1:8090;
        server_name _;
        location /stub_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }

    # ----- upstream: Frappe web (gunicorn on loopback). ---------------------
    upstream flock_web {
        server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ----- upstream: scaled-socketio tier (FLO-121). -----------------------
    # Sticky L7 via ip_hash: a real browser's engine.io session starts as HTTP
    # polling, then upgrades to WebSocket. The WS upgrade request MUST land on
    # the same backend that owned the polling session (it holds the socket.io
    # session state). ip_hash pins by source IP.
    #
    # Cloudflare collapses every viewer to a handful of CF source IPs, so for
    # a Cloudflare-fronted deploy swap ip_hash for a sticky-cookie module (the
    # runbook's "Cloudflare sticky cookie" section). For a direct-Frappe-Cloud
    # deploy ip_hash is correct.
    #
    # The backend server list is generated at container start by entrypoint.sh
    # from FLOCK_SIO_PROCESSES (one `server 127.0.0.1:900X;` per backend, ports
    # 9001..900N). This file lives at /etc/nginx/flock-os/socketio_upstream.conf
    # and is included here so the upstream always matches the live backend count
    # (FLO-246 architect fix: the hardcoded 4-backend list could not scale).
    # The generated file includes the ip_hash directive + N server lines.
    upstream flock_socketio {
        include /etc/nginx/flock-os/socketio_upstream.conf;
    }

    # ----- :8080 — Frappe web + static (the metered surface). --------------
    server {
        listen 8080 default_server;
        server_name _;

        # Frappe static assets (unmetered on Frappe Cloud — keep them off gunicorn).
        location /assets/ {
            alias /home/frappe/frappe-bench/sites/assets/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;
        }

        location /protected/ {
            internal;
            root /home/frappe/frappe-bench/sites;
            expires -1;
            access_log off;
        }

        # Frappe uploads + private files.
        location /files/ {
            root /home/frappe/frappe-bench/sites;
            expires 7d;
            access_log off;
        }

        # SEC-AUTH-1 / SEC-DOS-1 (FLO-682 audit, remediated FLO-686): the
        # Prometheus telemetry scrape endpoint is restricted to the internal
        # monitoring network. Defense-in-depth on top of the app-layer role gate
        # (Flock Auditor / System Manager in flock_os/telemetry_scrape.py) — the
        # endpoint is NOT reachable from the public ingress. The Prometheus
        # scraper runs on the host (loopback) or the monitoring subnet and
        # authenticates with a service account carrying the restricted role.
        # To allow a remote monitoring host, add its CIDR here, e.g.:
        #   allow 10.0.1.0/24;
        location = /api/method/flock_os.telemetry_scrape.scrape {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://flock_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Frappe-Site-Name $host;
        }

        # Everything else → gunicorn.
        location / {
            proxy_pass http://flock_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Frappe-Site-Name $host;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }
    }

    # ----- :9000 — the scaled-socketio sticky-L7 LB (FLO-121). -------------
    # FLO-922 / FLO-586 §6 gap G5: the WS-LB access log uses the sticky log
    # format (above) so a log-derived `ws.lb.affinity_miss_rate` metric can be
    # computed downstream — surfaces the chosen backend per request so a
    # sticky-hash miss storm (the §8 auth-callback wall's early indicator)
    # shows up in logs as a backend churn pattern.
    server {
        listen 9000;
        server_name _;
        access_log /var/log/nginx/socketio-access.log flock_sticky;

        location / {
            proxy_pass http://flock_socketio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Hold WS sessions open across the full §8 gate window and beyond.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # WS long-pollUpgrade: do not buffer.
            proxy_buffering off;
        }
    }
}
