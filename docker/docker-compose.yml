# Flock OS — prod-equivalent WS tier for the clean §8 15k gate (FLO-347 / FLO-10 §8).
#
# Bundles the full Frappe realtime stack as one `docker compose up`:
#   - mariadb           the site DB
#   - redis-cache       Frappe cache + queue-adjacent traffic
#   - redis-queue       Frappe background workers
#   - redis-adapter     DEDICATED Redis for @socket.io/redis-adapter
#                       (FLOCK_SIO_ADAPTER_REDIS) — clears testbed ceiling #2
#   - init              one-shot: new-site + migrate + smoke fixtures
#   - web               gunicorn (Frappe web) — the realtime auth callback target
#   - socketio-N        N node realtime workers (generated overlay; see below)
#   - ws-lb             nginx WS-upgrade LB fronting the socketio workers
#                       — clears testbed ceiling #1 (non-loopback LB<->backend hop,
#                       each container its own ephemeral-port space)
#
# Why this clears both dev-Mac ceilings natively (no host sudo sysctl, no
# loopback EADDRNOTAVAIL): every container has its OWN ephemeral-port range on a
# real docker network, so the LB<->backend hop does NOT double port demand on a
# single kernel the way a userspace loopback LB does. The adapter gets its own
# Redis instance so it never contends with cache/queue under the 15k burst.
# See docs/development/ws-broadcast-delivery.md -> Local testbed limits.
#
# The N socketio workers are NOT listed here: scripts/dev/docker-ws-tier.sh
# renders docker/.runtime/ws-workers.yml (one `socketio-N` service per worker,
# all pointing at the dedicated adapter Redis) from FLOCK_SIO_WORKERS, then runs
# `docker compose -f docker-compose.yml -f .runtime/ws-workers.yml up`. Keeping
# the worker count out of the base file means scaling is `FLOCK_SIO_WORKERS=8
# docker-ws-tier.sh up` with no hand-edits.
#
# Bring up / gate / tear down:
#   scripts/dev/docker-ws-tier.sh up          # build (once) + start the tier
#   scripts/dev/docker-ws-tier.sh gate        # k6 full 15k §8 gate -> load/telemetry
#   scripts/dev/docker-ws-tier.sh down        # tear the whole tier down
#
# Config: copy docker/.env.docker.example -> docker/.env.docker and edit.
# Runbook: docs/development/ws-broadcast-delivery.md -> Prod-equivalent docker tier.

name: flock-ws

services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in docker/.env.docker}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      # Frappe connects over TCP as root; gate the tier start on TCP readiness.
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend

  # Frappe cache + session state. AOF-persisted (FLO-353 / FLO-350 item 1:
  # Redis persistence half of the backup/restore story) so sessions + cached
  # state survive a container restart/recreate. appendfsync=everysec is the
  # standard prod durability/perf tradeoff (≤1s RPO on the cache tier, no
  # throughput cliff). The AOF file lives on a named volume, NOT ephemeral
  # container storage, so it survives `docker compose down` + `up` too.
  redis-cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  # Frappe background-worker queue (rq). AOF-persisted for the same reason as
  # the cache: in-flight job state survives a restart instead of vanishing.
  redis-queue:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  # Dedicated adapter Redis. Consumed by every socketio worker via
  # FLOCK_SIO_ADAPTER_REDIS (see docker-ws-tier.sh's worker overlay). Kept
  # separate from cache/queue so the 8x adapter pub/sub never stalls Frappe
  # cache under the 15k burst (the runbook's ceiling #2 unblock). Deliberately
  # NON-persistent: socket.io adapter state is transient pub/sub (live socket
  # fan-out), never a durability concern — persisting it would only resurrect
  # stale socket rooms after a restart.
  redis-adapter:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  # One-shot site provisioning. new-site + migrate (re-applies the realtime
  # wirings via the after_migrate hook) + the gathering-smoke runtime fixture
  # the §8 gate needs (docs/development/ws-broadcast-delivery.md -> Runtime
  # fixture). Idempotent; exits 0 once the site is ready, then web + workers
  # start (compose depends_on service_completed_successfully).
  init:
    build: &flock-build
      context: ..
      dockerfile: docker/Dockerfile
    image: ${FLOCK_IMAGE:-flock-os-frappe:ws-tier}
    env_file: [.env.docker]
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-cache:6379
    command: ["bash", "/home/frappe/init-site.sh"]
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      mariadb: {condition: service_healthy}
      redis-cache: {condition: service_healthy}
      redis-queue: {condition: service_healthy}
      redis-adapter: {condition: service_healthy}
    networks:
      - backend

  web:
    image: ${FLOCK_IMAGE:-flock-os-frappe:ws-tier}
    env_file: [.env.docker]
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-cache:6379
      WEBSERVER_PORT: ${WEBSERVER_PORT:-8000}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      # FLO-922 / FLO-586 §6 gap G2: when STATSD_HOST is set (the
      # statsd_exporter service in deploy/observability.yml), Frappe's built-in
      # statsd client emits frappe.request_time etc. AND the gunicorn
      # --statsd-host below emits worker-saturation gauges. Leave unset to keep
      # a fresh tier clean (no statsd server to talk to).
      STATSD_HOST: ${STATSD_HOST:-}
    # gunicorn serving the Frappe WSGI app. `bench serve` wraps this for dev;
    # the direct gunicorn invocation is the prod-equivalent shape. cwd MUST be
    # sites/ — frappe.init() defaults sites_path to cwd, so gunicorn run from
    # the bench root can't find the site (this is the frappe-docker working_dir
    # convention). Binds the SAME port internally that k6 advertises in its
    # Origin header so the socketio worker's get_user_info callback resolves
    # back to THIS web container via the flock_os.localhost network alias.
    # FLO-922 G2: --statsd-host wired only when $STATSD_HOST is set, so a
    # monitor-less bench ignores the flag. The expansion is a single shell
    # word so gunicorn never sees an empty arg.
    command:
      - bash
      - -lc
      - >
        cd sites &&
        ../env/bin/gunicorn -b 0.0.0.0:${WEBSERVER_PORT:-8000} -w ${GUNICORN_WORKERS:-4} -t 120
        ${STATSD_HOST:+--statsd-host ${STATSD_HOST}}
        --access-logfile - --error-logfile - frappe.app:application
    ports:
      - "${WEBSERVER_HOST_PORT:-8000}:${WEBSERVER_PORT:-8000}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      init: {condition: service_completed_successfully}
    networks:
      backend:
        # The realtime auth middleware's get_user_info callback resolves
        # Origin (`http://flock_os.localhost:8000`) -> this service, so the
        # callback stays on the docker network. The k6 client on the host
        # reaches the same name via the published port + /etc/hosts.
        aliases:
          - flock_os.localhost

  # nginx WS-upgrade LB. The conf is rendered from
  # scripts/dev/nginx-socketio.conf.template by docker-ws-tier.sh `up`, with one
  # `server socketio-N:9000;` per worker at the BACKENDS_INJECTED_HERE marker —
  # the SAME rendering scale-socketio.sh --lb nginx uses on the host.
  ws-lb:
    image: nginx:alpine
    volumes:
      - ./.runtime/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${WS_LB_HOST_PORT:-9000}:9000"
      - "${WS_LB_HTTP_HOST_PORT:-8100}:8100"
    # FLO-922 / FLO-586 §6 gap G5: stub_status exposed to the docker network
    # only (NOT published to the host — port 8090 on the host is taken by the
    # FLO-889 cloudflared tunnel edge). Prometheus runs in a sibling container
    # on flock-ws_backend, so it reaches ws-lb:8090 via docker DNS. The
    # stub_status location is allow-listed to private subnets in
    # scripts/dev/nginx-socketio.conf.template.
    expose:
      - "8090"
    # Each proxied WS connection is 2 fds on the LB (client + backend); 15k
    # gate = 30k+ fds. Raise nofile well above that so nginx never starves.
    ulimits:
      nofile: {soft: 1048576, hard: 1048576}
    depends_on:
      init: {condition: service_completed_successfully}
    networks:
      - backend

volumes:
  mariadb-data:
  # Redis AOF persistence (FLO-353): the appendonly file for cache + queue
  # lives on named volumes so it survives container restart/recreate/down.
  redis-cache-data:
  redis-queue-data:
  # Shared across init/web/socketio so the site (site_config.json + the
  # per-site DB creds) persists across container restarts and the one-shot
  # `init` is idempotent on re-runs (standard frappe-docker pattern).
  sites:

networks:
  backend:
    # A real (non-loopback) docker bridge network: each container gets its own
    # ephemeral-port space and the LB<->backend hop is a real network transit,
    # which is what clears the macOS loopback EADDRNOTAVAIL ceiling (#1).
    driver: bridge
